<!DOCTYPE html>
<html>
<head>
  <base href="/librai/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sinaliza AI - Reconhecimento de Libras em tempo real.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sinaliza_ai">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sinaliza AI</title>
  <link rel="manifest" href="manifest.json">

  <!-- CDN scripts do MediaPipe para Visão Computacional -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <style>
    /* Esconder o elemento de vídeo de processamento de frames original */
    #mediapipe-video-source {
      display: none;
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
    }
  </style>
</head>
<body>
  <!-- Vídeo invisível usado como fonte para o processador do MediaPipe -->
  <video id="mediapipe-video-source" autoplay playsinline muted></video>

  <script>
    // Interface Global de Interoperação JavaScript-Dart
    window.sinalizaAiMediaPipe = {
      handsDetected: false,
      faceDetected: false,
      poseDetected: false,
      latestLandmarks: null,
      isActive: false,

      // Inicia a câmera e o loop de landmarks
      init: function() {
        const self = window.sinalizaAiMediaPipe;
        const videoElement = document.getElementById('mediapipe-video-source');
        
        let currentHands = [];
        let currentPose = [];
        let currentFace = [];

        const updateLatestLandmarks = () => {
          // Combina todas as coordenadas em uma lista plana (1D) para o Dart
          self.latestLandmarks = [...currentHands, ...currentPose, ...currentFace];
        };

        // Inicializar Hands
        const hands = new Hands({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
          maxNumHands: 2,
          modelComplexity: 1,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
          if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            self.handsDetected = true;
            currentHands = results.multiHandLandmarks.flat();
          } else {
            self.handsDetected = false;
            currentHands = [];
          }
          updateLatestLandmarks();
        });

        // Inicializar Pose
        const pose = new Pose({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });
        pose.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
          if (results.poseLandmarks && results.poseLandmarks.length > 0) {
            self.poseDetected = true;
            currentPose = results.poseLandmarks;
          } else {
            self.poseDetected = false;
            currentPose = [];
          }
          updateLatestLandmarks();
        });

        // Inicializar FaceMesh
        const faceMesh = new FaceMesh({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        faceMesh.onResults((results) => {
          if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            self.faceDetected = true;
            currentFace = results.multiFaceLandmarks[0];
          } else {
            self.faceDetected = false;
            currentFace = [];
          }
          updateLatestLandmarks();
        });

        // Configurar acesso à câmera nativa do navegador
        const camera = new Camera(videoElement, {
          onFrame: async () => {
            if (self.isActive) {
              try {
                await Promise.all([
                  hands.send({ image: videoElement }).catch(e => console.warn("Erro Hands:", e)),
                  pose.send({ image: videoElement }).catch(e => console.warn("Erro Pose:", e)),
                  faceMesh.send({ image: videoElement }).catch(e => console.warn("Erro FaceMesh:", e))
                ]);
              } catch (e) {
                console.error("Erro ao enviar frame para o MediaPipe:", e);
              }
            }
          },
          width: 640,
          height: 480
        });

        self.start = function() {
          self.isActive = true;
          camera.start();
        };

        self.stop = function() {
          self.isActive = false;
          camera.stop();
        };
      }
    };

    // Inicializa a ponte ao carregar a página
    window.addEventListener('load', function() {
      try {
        window.sinalizaAiMediaPipe.init();
      } catch (e) {
        console.warn("MediaPipe não pôde ser carregado na inicialização.", e);
      }
    });
  </script>

  <!-- Script de Boot do Flutter Moderno -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
