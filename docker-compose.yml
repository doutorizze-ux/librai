version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sinaliza_postgres
    restart: always
    environment:
      POSTGRES_USER: sinaliza_user
      POSTGRES_PASSWORD: sinaliza_secure_pass123
      POSTGRES_DB: sinaliza_db
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinaliza_user -d sinaliza_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sinaliza_redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: sinaliza_api_gateway
    restart: always
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://sinaliza_user:sinaliza_secure_pass123@postgres:5432/sinaliza_db
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.tvcatolica.site
    container_name: sinaliza_admin_web
    restart: always
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.tvcatolica.site
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
