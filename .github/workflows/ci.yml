name: CI - Sinaliza AI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api-gateway/requirements.txt
          pip install pytest httpx pytest-asyncio

      - name: Run pytest
        run: |
          pytest apps/api-gateway/

  admin-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-python@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd apps/admin-web
          npm ci

      - name: Run lint and build
        run: |
          cd apps/admin-web
          npm run lint
          npm run build

  mobile-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd apps/mobile
          flutter pub get

      - name: Run analyzer and tests
        run: |
          cd apps/mobile
          flutter analyze
          flutter test
