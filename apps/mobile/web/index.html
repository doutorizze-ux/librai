<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sinaliza AI - Reconhecimento de Libras em tempo real.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sinaliza_ai">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sinaliza AI</title>
  <link rel="manifest" href="manifest.json">

  <!-- CDN scripts do MediaPipe para Visão Computacional -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    /* Esconder o elemento de vídeo de processamento de frames original */
    #mediapipe-video-source {
      display: none;
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
    }
  </style>
</head>
<body>
  <!-- Vídeo invisível usado como fonte para o processador do MediaPipe -->
  <video id="mediapipe-video-source" autoplay playsinline muted></video>

  <script>
    // Interface Global de Interoperação JavaScript-Dart
    window.sinalizaAiMediaPipe = {
      handsDetected: false,
      faceDetected: true, // Forçar verdadeiro no Web para simplificar enquadramento e evitar crash de RAM
      poseDetected: true, // Forçar verdadeiro no Web para simplificar enquadramento e evitar crash de RAM
      latestLandmarks: null,
      isActive: false,

      // Inicia a câmera e o loop de landmarks
      init: function() {
        const self = window.sinalizaAiMediaPipe;
        const videoElement = document.getElementById('mediapipe-video-source');
        
        let currentHands = [];
        let activeStream = null;
        let animationFrameId = null;

        const updateLatestLandmarks = () => {
          // Combina todas as coordenadas em uma lista plana (1D) para o Dart
          self.latestLandmarks = [...currentHands];
        };

        // Inicializar Hands
        const hands = new Hands({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
          maxNumHands: 2,
          modelComplexity: 1,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        const drawSkeletonCanvas = (multiHandLandmarks) => {
          const canvas = document.getElementById('mediapipe-overlay-canvas');
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          if (!ctx) return;

          const width = canvas.width = videoElement ? (videoElement.videoWidth || 640) : 640;
          const height = canvas.height = videoElement ? (videoElement.videoHeight || 480) : 480;
          
          ctx.clearRect(0, 0, width, height);

          const connections = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [9,10],[10,11],[11,12],[0,9],
            [13,14],[14,15],[15,16],[0,13],
            [17,18],[18,19],[19,20],[0,17],
            [5,9],[9,13],[13,17]
          ];

          for (const landmarks of multiHandLandmarks) {
            ctx.strokeStyle = '#00FFCC';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#00FFCC';
            ctx.shadowBlur = 6;

            for (const [start, end] of connections) {
              const p1 = landmarks[start];
              const p2 = landmarks[end];
              if (p1 && p2) {
                ctx.beginPath();
                ctx.moveTo(p1.x * width, p1.y * height);
                ctx.lineTo(p2.x * width, p2.y * height);
                ctx.stroke();
              }
            }

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#FFFFFF';
            for (const pt of landmarks) {
              ctx.beginPath();
              ctx.arc(pt.x * width, pt.y * height, 4, 0, 2 * Math.PI);
              ctx.fill();
            }
          }
        };

        const clearSkeletonCanvas = () => {
          const canvas = document.getElementById('mediapipe-overlay-canvas');
          if (canvas) {
            const ctx = canvas.getContext('2d');
            if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
          }
        };

        hands.onResults((results) => {
          if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            self.handsDetected = true;
            currentHands = results.multiHandLandmarks.flat();
            drawSkeletonCanvas(results.multiHandLandmarks);
          } else {
            self.handsDetected = false;
            currentHands = [];
            clearSkeletonCanvas();
          }
          updateLatestLandmarks();
        });

        // Loop de processamento de frames nativo
        async function processFrameLoop() {
          if (!self.isActive) return;
          
          if (videoElement && videoElement.readyState === 4) { // HAVE_ENOUGH_DATA
            try {
              await hands.send({ image: videoElement });
            } catch (e) {
              console.warn("Erro ao processar frame:", e);
            }
          }
          
          if (self.isActive) {
            animationFrameId = requestAnimationFrame(processFrameLoop);
          }
        }

        if (videoElement) {
          videoElement.addEventListener('pause', () => {
            if (self.isActive) {
              videoElement.play().catch(e => console.warn("Erro ao forçar play após pausa:", e));
            }
          });
          videoElement.addEventListener('loadedmetadata', () => {
            if (self.isActive) {
              videoElement.play().catch(e => console.warn("Erro ao forçar play após metadados:", e));
            }
          });
        }

        self.start = async function() {
          if (self.isActive) return;
          self.isActive = true;

          try {
            // Garantir que o elemento de vídeo esteja no body
            if (videoElement && !document.body.contains(videoElement)) {
              document.body.appendChild(videoElement);
            }

            // Solicitar fluxo de câmera de forma estável usando WebRTC nativo
            const stream = await navigator.mediaDevices.getUserMedia({
              video: {
                width: { ideal: 1280 },
                height: { ideal: 720 },
                aspectRatio: 1.7777777778,
                facingMode: "user"
              },
              audio: false
            });

            activeStream = stream;
            if (videoElement) {
              videoElement.srcObject = stream;
              videoElement.style.display = 'block';
              await videoElement.play().catch(e => console.warn("Erro no play inicial:", e));
            }

            // Iniciar loop de frames
            processFrameLoop();
          } catch (err) {
            console.error("Erro ao acessar câmera física:", err);
          }
        };

        self.stop = function() {
          self.isActive = false;
          
          // Parar loop
          if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
          }

          // Fechar hardware da câmera completamente
          if (activeStream) {
            activeStream.getTracks().forEach(track => {
              try {
                track.stop();
              } catch (e) {}
            });
            activeStream = null;
          }

          // Limpar elemento e re-anexar de forma oculta no body
          if (videoElement) {
            videoElement.srcObject = null;
            videoElement.style.display = 'none';
            videoElement.style.position = 'absolute';
            videoElement.style.width = '0';
            videoElement.style.height = '0';
            videoElement.style.opacity = '0';
            if (!document.body.contains(videoElement)) {
              document.body.appendChild(videoElement);
            }
          }
        };
      }
    };

    // Inicializa a ponte ao carregar a página
    window.addEventListener('load', function() {
      try {
        window.sinalizaAiMediaPipe.init();
      } catch (e) {
        console.warn("MediaPipe não pôde ser carregado na inicialização.", e);
      }
    });
  </script>

  <!-- Script de Boot do Flutter Moderno -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
